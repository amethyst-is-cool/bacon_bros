<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/app.css') }}">
</head>

<body class="h-screen overflow-hidden text-white relative">

  <section class="vh-100" style="background-color: #1f0000;">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col col-xl-10">
          <div class="card" style="border-radius: 1rem;">
            <div class="row g-0">

              <div class="col-md-6 col-lg-7 d-flex align-items-center">
                <div class="card-body p-4 p-lg-5 text-black">

                  <form action="/login" method="POST">

                    <div class="d-flex align-items-center mb-3 pb-1">
                      <span class="h1 fw-bold mb-0">Lettuce Relax</span>
                    </div>

                    <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Log into your account</h5>

                    {% if error %}
                    <div class="bg-red-50 border border-red-100 text-red-600 text-sm font-semibold rounded-xl px-3 py-3">
                      {{ error | safe }}
                    </div>
                    {% endif %}

                    <div data-mdb-input-init class="form-outline mb-4">
                  
                      <input type="text" name="username" class="form-control form-control-lg" required/>
                      <label class="form-label" for="form2Example17">Username</label>
                    </div>

                    <div data-mdb-input-init class="form-outline mb-4">
                      <input type="password" name="password" class="form-control form-control-lg" required/>
                      <label class="form-label" for="form2Example27">Password</label>
                    </div>

                    <div class="pt-1 mb-4">
                      <input class="btn btn-dark btn-lg btn-block" type="submit" value="LOG IN">
                    </div>

                    <p class="mb-5 pb-lg-2" style="color: #393f81;">Don't have an account? <a href="/register"
                        style="color: #393f81;">Register here</a></p>
                  </form>

                </div>
              </div>
              <div class="col-md-6 col-lg-5 d-none d-md-block">
                <img src="https://static.nike.com/a/images/f_auto/dpr_3.0,cs_srgb/h_500,c_limit/725808af-3bd2-415c-a249-28e42074c8fa/the-best-nike-workout-clothes-for-the-gym.jpg"
                  alt="workout image" class="img-fluid" style="border-radius: 0 1rem 1rem 0;  max-height: 583px;" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  </body>
</html>
