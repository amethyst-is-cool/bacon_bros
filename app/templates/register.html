<!DOCTYPE html>
<!--
  Bacon Bros
  SoftDev

  Based off: Snorelacks
 -->


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacon Bros - Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/app.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen overflow-hidden text-white relative">

  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-black/60 z-10"></div>
  </div>

  <div class="relative z-20 h-full flex flex-col justify-center items-center px-4">
      <div class="bg-black backdrop-blur-xl border border-white/10 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md flex flex-col gap-4">

      <div class="text-center">
        <h1 class="text-4xl font-bold tracking-wider">
          <span class="text-blue-400">REGIST</span>RATION
        </h1>
        <p class="text-blue-200/60 mt-2 text-xs uppercase tracking-widest">For a New user</p>
      </div>


      {% if error %}
          <div class="bg-red-50 border border-red-100 text-red-600 text-sm font-semibold rounded-xl px-3 py-3">
            {{ error | safe }}
          </div>
      {% endif %}

      <form action="/register" method="POST" class="flex flex-col gap-3">

      <div class="flex flex-col gap-1">
        <label class="text-xs text-blue-300 uppercase ml-1 required">Username</label>
        <input type="text"
          name="username"
          placeholder="Choose a Username..."
          class="search-input w-full text-black p-3 rounded-xl"
          required>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs text-blue-300 uppercase ml-1 required">Password</label>
        <input type="password"
          name="password"
          placeholder="Create Password..."
          class="search-input w-full text-black p-3 rounded-xl"
          required>
      </div>

        <button type="submit" class="mt-2 w-full btn-primary py-3 rounded-xl text-lg tracking-widest">
          Create Account
        </button>
      </form>

      <div class="text-center text-sm pt-4 border-t border-white/10 text-gray-400">
        <p class="mb-4">
          Already have an account?
          <a href="/login" class="text-blue-400 font-bold hover:text-white transition-colors">
            Login Here
          </a>
        </p>
      </div>

    </div>

  </div>

</body>
</html>
