  <!DOCTYPE html>
<html>
<head>
  <title>HOME</title>

  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
    <span class="navbar-brand fw-bold">Lettuce Relax</span>
    <div class="ms-auto d-flex gap-2">
      <form action="/" method="POST"><input class="btn btn-outline-primary" type="submit" value="HOME"></form>
      <form action="/profile" method="POST"><input class="btn btn-outline-primary" type="submit" value="PROFILE"></form>
      <form action="/explore" method="POST"><input class="btn btn-outline-primary" type="submit" value="EXPLORE"></form>
      <form action="/personalize" method="POST"><input class="btn btn-outline-primary" type="submit" value="PERSONALIZE"></form>
      <form action="/logout" method="POST"><input class="btn btn-outline-danger" type="submit" value="LOG OUT"></form>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container text-center mt-5">

    <h1 class="fw-bold display-4">Nutrition</h1>
    <p class="text-muted fs-5">Find data on your favorite foods!</p>

    <!-- Search Card -->
    <div class="card shadow-sm mt-4 p-4 mx-auto" style="max-width: 500px;">

      <form action="{{ url_for('results')}}" method="get">

        <div class="mb-3">
          <input type="text"
            name="search_query"
            placeholder="Search up..."
            class="form-control form-control-lg"
            required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          SEARCH
        </button>

      </form>

    </div>

  </div>

</body>
</html>
