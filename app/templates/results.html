<!DOCTYPE HTML>
<html>
<head>
<title>Results for {{query}}
</title>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% for i in foods %}
{{i[0]}}
<canvas id="chart{{ loop.index }}" width = "400" height = "400"></canvas>
<br>
<script>
const data{{loop.index}} = {
  labels: {{params | tojson}},
  datasets: [{
    label: 'Food',
    data: {{i[1:] | tojson}},
    backgroundColor: 'rgba(54, 162, 235, 0.2)',
    borderColor: 'rgba(54, 162, 235, 1)',
    borderWidth: 2
  }]
};

const config{{loop.index}} = {
  type: 'radar',
  data: data{{loop.index}},
  options: {
    responsive: false,
    maintainAspectRatio: false
  }
};

const ctx{{loop.index}} = document.getElementById("chart{{ loop.index }}").getContext('2d');
new Chart(ctx{{loop.index}}, config{{loop.index}});
</script>
{% endfor %}
</body>
</html>
