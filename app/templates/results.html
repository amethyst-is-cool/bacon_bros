<!DOCTYPE HTML>
<html>
<head>
  <title>Results for {{query}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
    <a class="navbar-brand" href="#">
      <img src="/static/favicon.ico" width="30" height="30" class="d-inline-block align-top">
      Lettuce Relax
    </a>

    <div class="ms-auto d-flex gap-2">
      <form action="/" method="POST"><input class="btn btn-outline-primary" type="submit" value="HOME"></form>
      <form action="/profile" method="POST"><input class="btn btn-outline-primary" type="submit" value="PROFILE"></form>
      <form action="/explore" method="POST"><input class="btn btn-outline-primary" type="submit" value="EXPLORE"></form>
      <form action="/personalize" method="POST"><input class="btn btn-outline-primary" type="submit" value="PERSONALIZE"></form>
      <form action="/logout" method="POST"><input class="btn btn-outline-danger" type="submit" value="LOG OUT"></form>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="fs-1 fw-bold text-center">Search Results</h1>
    <p class="text-center text-muted">Showing results for "<strong>{{query}}</strong>"</p>
  </div>

  <div class="container mt-5">
    <div class="row g-4">

      {% for i in foods %}
      <div class="col-md-6 col-lg-4">

        <div class="card shadow-sm h-100">
          <div class="card-body text-center">
            <h4 class="card-title fw-bold mb-3">{{i[0]}}</h4>
            <canvas
              id="chart{{ loop.index }}"
              height="300"
              data-name="{{ i[0] }}"
              data-values='{{ i[1:] | tojson }}'>
            </canvas>
          </div>
        </div>
      </div>
      <script>
      const canvas{{loop.index}} = document.getElementById("chart{{ loop.index }}");

      canvas{{loop.index}}.addEventListener("click", function () {
          newF(this);
      });
      </script>
      <script>
        const rawData{{loop.index}} = {{i[2:] | tojson}};

        const data{{loop.index}} = {
          labels: {{params[1:] | tojson}},
          datasets: [{
            label: 'Food',
            data: rawData{{loop.index}},
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 2
          }]
        };

        const config{{loop.index}} = {
          type: 'radar',
          data: data{{loop.index}},
          options: {
            responsive: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              r: {
                ticks: {
                  backdropColor: 'transparent'
                }
              }
            }
          }
        };

        const ctx{{loop.index}} = document.getElementById("chart{{ loop.index }}").getContext('2d');
        new Chart(ctx{{loop.index}}, config{{loop.index}});
      </script>

      {% endfor %}
      <script>

      function newF(element) {
        const name = element.dataset.name;
          fetch("/profile", {
          method: "POST",
          body: new URLSearchParams({
              ch: name
          })
      })
      .then(() => {
        window.location.href = "/profile#results-section";
      });
      }
      </script>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
